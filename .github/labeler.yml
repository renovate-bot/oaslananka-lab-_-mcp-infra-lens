ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/labeler.yml'
          - 'scripts/prepublish-check.*'
docs:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '*.md'
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'package-lock.json'
source:
  - changed-files:
      - any-glob-to-any-file: 'src/**'
tests:
  - changed-files:
      - any-glob-to-any-file: 'test/**'
security:
  - changed-files:
      - any-glob-to-any-file:
          - 'SECURITY.md'
          - '.pre-commit-config.yaml'
release:
  - changed-files:
      - any-glob-to-any-file:
          - 'release-please-config.json'
          - '.release-please-manifest.json'
          - 'CHANGELOG.md'
          - 'mcp.json'
          - 'server.json'
docker:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - 'Dockerfile.test'
          - 'docker-compose*.yml'
