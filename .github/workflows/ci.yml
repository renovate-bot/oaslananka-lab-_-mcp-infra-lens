name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025]
        node-version: ["22"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Rebuild native module
        run: npm rebuild better-sqlite3
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Integration tests
        run: npm run test:integration
      - name: Build
        run: npm run build
      - name: E2E SSH fixture
        if: matrix.os == 'ubuntu-24.04'
        run: |
          docker compose -f docker-compose.test.yml up -d
          npm run test:e2e
          docker compose -f docker-compose.test.yml down -v
      - name: Pack sanity
        run: npm pack --dry-run
      - name: MCP metadata check
        run: node scripts/validate-mcp-metadata.mjs
      - name: Docker build smoke
        if: matrix.os == 'ubuntu-24.04'
        run: |
          docker build -t mcp-infra-lens:ci .
          docker run --rm mcp-infra-lens:ci node dist/mcp.js --help
      - name: Coverage
        if: matrix.os == 'ubuntu-24.04'
        run: npm run test:coverage
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe
        with:
          fail_ci_if_error: false
          flags: unit
      - name: SonarQube Scan
        if: matrix.os == 'ubuntu-24.04' && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
        uses: SonarSource/sonarqube-scan-action@13990a695682794b53148ff9f6a8b6e22e43955e
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
