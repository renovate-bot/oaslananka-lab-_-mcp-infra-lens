name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 5 * * 3"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@7fd177fa680c9881b53cdab4d346d32574c9f7f4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@7fd177fa680c9881b53cdab4d346d32574c9f7f4
      - uses: github/codeql-action/analyze@7fd177fa680c9881b53cdab4d346d32574c9f7f4
