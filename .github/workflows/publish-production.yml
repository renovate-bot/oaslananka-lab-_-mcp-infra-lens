name: Publish Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA to publish
        required: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: publish-production-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  verify-package:
    outputs:
      publish_ref: ${{ steps.ref.outputs.value }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Resolve publish ref
        id: ref
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          if [[ ! "${INPUT_REF}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "INVALID_PUBLISH_REF" >&2
            echo "Publish ref must be a 40-character commit SHA." >&2
            exit 1
          fi
          if [[ "${GITHUB_SHA}" != "${INPUT_REF}" ]]; then
            echo "PUBLISH_WORKFLOW_SHA_MISMATCH" >&2
            echo "Dispatch this workflow at the same commit SHA passed as inputs.ref." >&2
            exit 1
          fi
          echo "value=${INPUT_REF}" >> "${GITHUB_OUTPUT}"
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ steps.ref.outputs.value }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify publish ref is on release channel
        env:
          PUBLISH_REF: ${{ steps.ref.outputs.value }}
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin main
          if ! git merge-base --is-ancestor "${PUBLISH_REF}" origin/main; then
            echo "PUBLISH_REF_NOT_ON_RELEASE_CHANNEL" >&2
            echo "Ref must be reachable from origin/main." >&2
            exit 1
          fi
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install and verify package
        run: |
          set -euo pipefail
          npm ci
          npm rebuild better-sqlite3
          npm run build
          npm run prepublishOnly --if-present
          mkdir -p publish-artifact
          npm pack --pack-destination publish-artifact
          node --input-type=commonjs -e "const p=require('./package.json'); if (!p.name || !p.version) throw new Error('package.json name/version is required'); console.log(p.name + '@' + p.version);"
      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: npm-package
          path: publish-artifact/*.tgz
          if-no-files-found: error

  npm-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: verify-package
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: npm-package
          path: publish-artifact
      - name: Setup Node.js for npm publish
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use npm for trusted publishing
        run: npm install -g npm@11.6.2
      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          FALLBACK_NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          token="${NPM_TOKEN:-${FALLBACK_NODE_AUTH_TOKEN:-}}"
          if [[ -n "${token}" ]]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "${token}" > "${HOME}/.npmrc"
            export NODE_AUTH_TOKEN="${token}"
          else
            unset NODE_AUTH_TOKEN
            if [[ -n "${NPM_CONFIG_USERCONFIG:-}" && -f "${NPM_CONFIG_USERCONFIG}" ]]; then
              sed -i.bak '/_authToken/d' "${NPM_CONFIG_USERCONFIG}"
            fi
            if [[ -f "${HOME}/.npmrc" ]]; then
              sed -i.bak '/_authToken/d' "${HOME}/.npmrc"
            fi
          fi
          package_file="$(find publish-artifact -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          if [[ -z "${package_file}" ]]; then
            echo "NPM_PACKAGE_ARTIFACT_MISSING" >&2
            exit 1
          fi
          package_file="$(realpath "${package_file}")"
          package_json="$(mktemp --suffix=.json)"
          tar -xOf "${package_file}" package/package.json > "${package_json}"
          package_name="$(node -e "const p=require(process.argv[1]); console.log(p.name || '')" "${package_json}")"
          package_version="$(node -e "const p=require(process.argv[1]); console.log(p.version || '')" "${package_json}")"
          if [[ -z "${package_name}" || -z "${package_version}" ]]; then
            echo "NPM_PACKAGE_METADATA_INVALID" >&2
            exit 1
          fi
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "NPM_PACKAGE_VERSION_ALREADY_PUBLISHED"
            exit 0
          fi
          publish_log="$(mktemp)"
          set +e
          npm publish "${package_file}" --provenance --access public >"${publish_log}" 2>&1
          status="$?"
          set -e
          if [[ "${status}" -ne 0 ]]; then
            if grep -Eiq "(already exists|cannot publish over|previously published|forbidden.*pre-existing version|cannot modify pre-existing version)" "${publish_log}"; then
              echo "NPM_PACKAGE_VERSION_ALREADY_PUBLISHED"
              cat "${publish_log}"
              exit 0
            fi
            if [[ -z "${token}" ]]; then
              echo "NPM_TRUSTED_PUBLISHING_NOT_CONFIGURED" >&2
              echo "NPM_TOKEN_SECRET_MISSING" >&2
            else
              echo "NPM_REGISTRY_PERMISSION_DENIED" >&2
            fi
            cat "${publish_log}" >&2
            exit "${status}"
          fi
          cat "${publish_log}"

  mcp-registry-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: production
    needs:
      - verify-package
      - npm-publish
    if: needs.npm-publish.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.verify-package.outputs.publish_ref }}
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci
      - name: Check MCP registry credentials
        env:
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [[ ! -f mcp.json ]] && ! node --input-type=commonjs -e 'const p=require("./package.json"); process.exit((p.mcp || p.mcpName) ? 0 : 1)'; then
            echo "MCP_REGISTRY_CONFIG_MISSING" >&2
            echo "Add mcp.json, server.json, or package.json MCP registry metadata before registry publishing." >&2
            exit 1
          fi
          if ! node --input-type=commonjs -e 'const p=require("./package.json"); process.exit(p.scripts && p.scripts["publish:mcp"] ? 0 : 1)'; then
            echo "MCP_REGISTRY_PUBLISH_COMMAND_NOT_CONFIGURED" >&2
            echo "Add a publish:mcp package script or supported MCP registry metadata for this repository." >&2
            exit 1
          fi
          if [[ -z "${MCP_REGISTRY_TOKEN:-}" ]]; then
            echo "MCP_REGISTRY_CREDENTIALS_MISSING" >&2
            echo "Required secret: MCP_REGISTRY_TOKEN" >&2
            exit 1
          fi
          npm run --silent publish:mcp
