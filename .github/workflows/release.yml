name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-24.04
    if: github.repository == 'oaslananka-lab/mcp-infra-lens'
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: production
    permissions:
      contents: write
      id-token: write
      attestations: write
      actions: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install
        run: npm ci
      - name: Rebuild native module
        run: npm rebuild better-sqlite3
      - name: Build
        run: npm run build
      - name: Pack
        run: npm pack
      - name: Publish to npm
        run: npm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Upload release asset
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" ./*.tgz
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Attest build provenance
        uses: actions/attest@ce27ba3b4a9a139d9a20a4a07d69fabb52f1e5bc
        with:
          subject-path: "*.tgz"
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Docker build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: true
          tags: ghcr.io/oaslananka-lab/mcp-infra-lens:${{ needs.release-please.outputs.version }}
